<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S&S Props">
<meta name="theme-color" content="#12100E">
<title>S&S Props</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #12100E;
    --parchment:#F5EFE0;
    --cream:    #FAF6EC;
    --gold:     #C9963A;
    --gold-dim: #8A6425;
    --red:      #9B2C2C;
    --green:    #2D5A3D;
    --purple:   #4A3566;
    --slate:    #2E4057;
    --muted:    #7A7060;
    --border:   #DDD4B8;
    --card:     #FFFDF6;
    --shadow:   rgba(18,16,14,0.12);
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--ink);
    font-family: 'DM Mono', monospace;
    color: var(--ink);
    overscroll-behavior: none;
  }

  /* ── APP SHELL ── */
  #app {
    display: flex; flex-direction: column;
    height: 100dvh;
    background: var(--cream);
  }

  /* ── HEADER ── */
  #header {
    background: var(--ink);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
    border-bottom: 2px solid var(--gold);
  }
  #header-back {
    color: var(--gold); font-size: 20px; background: none; border: none;
    cursor: pointer; padding: 4px 8px 4px 0; display: none; line-height: 1;
  }
  #header-title {
    flex: 1;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600;
    color: var(--parchment);
    letter-spacing: 0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #header-sub {
    font-size: 9px; color: var(--gold); letter-spacing: 0.12em;
    text-transform: uppercase; margin-top: 1px;
  }
  #header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    background: none; border: none; color: var(--gold);
    font-size: 18px; cursor: pointer; padding: 4px;
    line-height: 1; border-radius: 4px;
  }

  /* ── SEARCH BAR ── */
  #search-bar {
    background: var(--ink);
    padding: 0 16px 10px;
    flex-shrink: 0;
  }
  #search-input {
    width: 100%; background: #1E1B17;
    border: 1px solid #3A3228; border-radius: 8px;
    color: var(--parchment); font-family: 'DM Mono', monospace;
    font-size: 13px; padding: 9px 12px;
    outline: none; transition: border-color 0.2s;
  }
  #search-input::placeholder { color: #6B5F4A; }
  #search-input:focus { border-color: var(--gold); }

  /* ── FILTER PILLS ── */
  #filter-bar {
    background: var(--ink);
    padding: 0 16px 12px;
    display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  #filter-bar::-webkit-scrollbar { display: none; }
  .pill {
    white-space: nowrap; border-radius: 100px;
    border: 1px solid #3A3228; background: #1E1B17;
    color: #8A7A62; font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.06em;
    padding: 5px 11px; cursor: pointer; transition: all 0.15s;
    flex-shrink: 0;
  }
  .pill.active { background: var(--gold); border-color: var(--gold); color: var(--ink); }

  /* ── PROP LIST ── */
  #list-view {
    flex: 1; overflow-y: auto;
    padding: 8px 12px calc(var(--safe-bot) + 16px);
  }

  .section-header {
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); padding: 16px 4px 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .group-header {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold-dim); padding: 10px 4px 4px;
  }

  .prop-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 10px;
    margin-bottom: 5px; padding: 11px 12px;
    box-shadow: 0 1px 3px var(--shadow);
    cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
    border: 1px solid transparent;
    -webkit-user-select: none; user-select: none;
  }
  .prop-row:active { transform: scale(0.98); box-shadow: 0 0 0 var(--shadow); }
  .prop-row.has-data { border-color: var(--gold); }

  .prop-status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .prop-name {
    flex: 1; font-family: 'Cormorant Garamond', serif;
    font-size: 15px; font-weight: 600; line-height: 1.2;
    color: var(--ink);
  }
  .prop-meta {
    font-size: 9px; color: var(--muted); margin-top: 1px;
    font-family: 'DM Mono', monospace;
  }
  .prop-indicators { display: flex; gap: 4px; align-items: center; }
  .ind { font-size: 11px; opacity: 0.5; }
  .ind.active { opacity: 1; }
  .prop-chevron { color: var(--border); font-size: 13px; flex-shrink: 0; }

  /* ── DETAIL VIEW ── */
  #detail-view {
    display: none; flex: 1; overflow-y: auto;
    padding: 0 0 calc(var(--safe-bot) + 80px);
  }

  .detail-hero {
    background: var(--ink); padding: 16px;
    border-bottom: 1px solid var(--gold);
  }
  .detail-group-label {
    font-size: 9px; letter-spacing: 0.14em; color: var(--gold);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .detail-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 600; color: var(--parchment);
    line-height: 1.1; margin-bottom: 12px;
  }
  .detail-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 100px; font-weight: 500;
  }
  .chip-status-needed    { background: var(--red);    color: #FFE4E4; }
  .chip-status-pull      { background: var(--green);  color: #D4FFE4; }
  .chip-status-various   { background: var(--purple); color: #EAD4FF; }
  .chip-status-tbd       { background: var(--gold-dim); color: #FFF0CC; }
  .chip-info { background: #2A2520; color: #A89880; }

  .detail-body { padding: 14px 14px 0; }

  .detail-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 12px; overflow: hidden;
  }
  .detail-card-header {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); padding: 10px 14px 0;
  }

  /* Notes read-only */
  .detail-notes-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; line-height: 1.55; color: var(--ink);
    padding: 6px 14px 12px; font-style: italic;
  }

  /* Status picker */
  .status-picker {
    display: flex; flex-wrap: wrap; gap: 7px;
    padding: 12px 16px 14px;
  }
  .status-opt {
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 6px 13px; border-radius: 100px; font-weight: 500;
    border: 2px solid transparent; cursor: pointer;
    opacity: 0.38; transition: opacity 0.15s, border-color 0.15s;
    font-family: 'DM Mono', monospace;
  }
  .status-opt.selected { opacity: 1; border-color: rgba(255,255,255,0.7); }
  .status-opt:active { transform: scale(0.96); }

  /* Editable text areas */
  .field-label {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); padding: 10px 14px 4px; display: block;
  }
  .field-input {
    width: 100%; background: transparent;
    border: none; border-top: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px; color: var(--ink); line-height: 1.55;
    padding: 10px 14px; resize: none; outline: none;
    min-height: 80px;
  }
  .field-input::placeholder { color: var(--border); font-style: italic; }
  .field-input:focus { background: #FFFEF8; }

  /* Spent / hours row */
  .fields-row { display: flex; }
  .fields-row .field-half { flex: 1; }
  .fields-row .field-half + .field-half { border-left: 1px solid var(--border); }
  .field-inline {
    width: 100%; background: transparent;
    border: none; border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--ink);
    padding: 10px 14px; outline: none;
  }
  .field-inline::placeholder { color: var(--border); }
  .field-inline:focus { background: #FFFEF8; }

  /* Image zones */
  .img-zone-wrap { padding: 0 14px 14px; }
  .img-zone-label {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 10px 14px 8px; color: var(--muted); display: flex;
    align-items: center; justify-content: space-between;
  }
  .img-zone-label span { color: var(--muted); }
  .img-zone-add-btn {
    background: var(--gold); color: var(--ink);
    border: none; border-radius: 100px;
    font-size: 10px; font-family: 'DM Mono', monospace;
    font-weight: 500; padding: 4px 12px;
    cursor: pointer; letter-spacing: 0.04em;
  }
  .img-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 4px; min-height: 80px;
  }
  .img-grid.empty {
    background: var(--parchment); border-radius: 8px;
    border: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    min-height: 80px; grid-template-columns: unset;
  }
  .img-placeholder-text {
    font-size: 10px; color: var(--border); letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .img-thumb-wrap {
    position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden;
    background: var(--parchment);
  }
  .img-thumb {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .img-del {
    position: absolute; top: 3px; right: 3px;
    background: rgba(18,16,14,0.75); color: white;
    border: none; border-radius: 50%; width: 20px; height: 20px;
    font-size: 11px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; line-height: 1;
  }
  .img-file-input { display: none; }

  /* Save indicator */
  #save-toast {
    position: fixed; bottom: calc(var(--safe-bot) + 70px); left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #D4FFE4;
    font-size: 11px; letter-spacing: 0.08em;
    padding: 8px 18px; border-radius: 100px;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
    white-space: nowrap;
  }
  #save-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    background: var(--ink); border-top: 1px solid #2A2520;
    padding: 10px 0 calc(var(--safe-bot) + 6px);
    display: grid; grid-template-columns: repeat(4, 1fr);
    flex-shrink: 0;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: #5A4E3C; padding: 4px;
    font-family: 'DM Mono', monospace;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-icon { font-size: 18px; line-height: 1; }
  .nav-label { font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── DASHBOARD VIEW ── */
  #dash-view {
    display: none; flex: 1; overflow-y: auto;
    padding: 14px 14px calc(var(--safe-bot) + 20px);
  }
  .dash-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600; color: var(--ink);
    margin-bottom: 14px;
  }
  .dash-stat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }
  .dash-stat {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border); padding: 14px;
    text-align: center;
  }
  .dash-stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 600; color: var(--ink); line-height: 1;
  }
  .dash-stat-label {
    font-size: 9px; letter-spacing: 0.1em; color: var(--muted);
    text-transform: uppercase; margin-top: 4px;
  }
  .dash-stat.highlight { background: var(--ink); border-color: var(--gold); }
  .dash-stat.highlight .dash-stat-num { color: var(--gold); }
  .dash-stat.highlight .dash-stat-label { color: #8A7A62; }

  .dash-section-title {
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 16px 0 8px;
  }
  .dash-item {
    background: var(--card); border-radius: 10px;
    border: 1px solid var(--border); padding: 10px 14px;
    margin-bottom: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .dash-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 600; flex: 1; line-height: 1.2;
  }
  .dash-item-tag {
    font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 100px;
    background: var(--parchment); color: var(--muted); flex-shrink: 0;
  }

  .export-btn {
    width: 100%; background: var(--ink); color: var(--gold);
    border: 1px solid var(--gold); border-radius: 10px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 0.08em; padding: 14px;
    cursor: pointer; margin-top: 16px;
    transition: background 0.2s;
  }
  .export-btn:active { background: #1E1B17; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 13px;
  }

  /* ── QUESTIONS VIEW ── */
  #questions-view {
    display: none; flex: 1; overflow-y: auto;
    padding: 0 0 calc(var(--safe-bot) + 20px);
  }
  .q-recipient-block {
    margin-bottom: 4px;
  }
  .q-recipient-header {
    background: var(--ink); color: var(--gold);
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 12px 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
    border-bottom: 1px solid #2A2520;
  }
  .q-email-btn {
    background: var(--gold); color: var(--ink);
    border: none; border-radius: 100px;
    font-family: 'DM Mono', monospace; font-size: 9px;
    font-weight: 500; letter-spacing: 0.06em;
    padding: 5px 13px; cursor: pointer;
  }
  .q-item {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 11px 16px; cursor: pointer;
  }
  .q-item:active { background: var(--parchment); }
  .q-prop-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 600; color: var(--muted);
    margin-bottom: 3px;
  }
  .q-text {
    font-size: 13px; color: var(--ink); line-height: 1.45;
  }
  .q-empty {
    text-align: center; padding: 60px 24px;
    color: var(--muted); font-size: 12px; line-height: 1.7;
  }
  .q-empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }

  /* Multi-question cards */
  .q-card-list { padding: 8px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
  .q-card {
    background: var(--parchment); border-radius: 8px;
    border: 1px solid var(--border); overflow: hidden;
  }
  .q-card-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px 0; justify-content: space-between;
  }
  .q-card-select {
    flex: 1; background: transparent; border: none;
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--gold); outline: none; cursor: pointer;
    appearance: none; -webkit-appearance: none;
    letter-spacing: 0.04em;
  }
  .q-card-del {
    background: none; border: none; color: var(--border);
    font-size: 16px; cursor: pointer; padding: 0 2px;
    line-height: 1; flex-shrink: 0;
  }
  .q-card-del:active { color: var(--red); }
  .q-card-textarea {
    width: 100%; background: transparent; border: none;
    border-top: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; color: var(--ink); line-height: 1.5;
    padding: 8px 10px; resize: none; outline: none;
    min-height: 64px;
  }
  .q-card-textarea::placeholder { color: var(--border); font-style: italic; }
  .q-card-textarea:focus { background: #FFFEF8; }
  .q-add-btn {
    width: 100%; background: transparent;
    border: 1px dashed var(--border); border-radius: 8px;
    color: var(--gold-dim); font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    padding: 10px; cursor: pointer; margin-top: 2px;
    transition: border-color 0.15s, color 0.15s;
  }
  .q-add-btn:active { border-color: var(--gold); color: var(--gold); }

  /* Directed-to selector in detail */
  .directed-row {
    display: flex; align-items: center; gap: 0;
    border-top: 1px solid var(--border);
  }
  .directed-label {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); padding: 10px 14px; white-space: nowrap; flex-shrink: 0;
  }
  .directed-select {
    flex: 1; background: transparent; border: none;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--gold); padding: 10px 14px 10px 0;
    outline: none; cursor: pointer; appearance: none;
    -webkit-appearance: none;
  }
  .directed-arrow { color: var(--border); padding-right: 14px; font-size: 10px; flex-shrink: 0; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <button id="header-back" onclick="showList()">‹</button>
    <div style="flex:1; min-width:0;">
      <div id="header-title">Sense &amp; Sensibility</div>
      <div id="header-sub">Props Design &amp; Management</div>
    </div>
    <div id="header-actions">
      <button class="icon-btn" onclick="showDash()" title="Dashboard">◈</button>
    </div>
  </div>

  <!-- SEARCH (list only) -->
  <div id="search-bar">
    <input id="search-input" type="search" placeholder="Search props…"
           oninput="onSearch(this.value)" autocomplete="off" autocorrect="off">
  </div>

  <!-- FILTER PILLS -->
  <div id="filter-bar">
    <button class="pill active" onclick="setFilter('all',this)">All</button>
    <button class="pill" onclick="setFilter('needed',this)">Needed</button>
    <button class="pill" onclick="setFilter('pull',this)">Pull Stock</button>
    <button class="pill" onclick="setFilter('noted',this)">Has Notes</button>
    <button class="pill" onclick="setFilter('photos',this)">Has Photos</button>
    <button class="pill" onclick="setFilter('questions',this)">Has Questions</button>
    <button class="pill" onclick="setFilter('FURNITURE',this)">Furniture</button>
    <button class="pill" onclick="setFilter('PROPS',this)">Props</button>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view"></div>

  <!-- DETAIL VIEW -->
  <div id="detail-view"></div>

  <!-- DASHBOARD VIEW -->
  <div id="dash-view"></div>

  <!-- QUESTIONS VIEW -->
  <div id="questions-view"></div>

  <!-- SAVE TOAST -->
  <div id="save-toast">✓ Saved</div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-list" onclick="showList()">
      <span class="nav-icon">☰</span>
      <span class="nav-label">Props</span>
    </button>
    <button class="nav-btn" id="nav-questions" onclick="showQuestions()">
      <span class="nav-icon">✉</span>
      <span class="nav-label">Questions</span>
    </button>
    <button class="nav-btn" id="nav-dash" onclick="showDash()">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-btn" id="nav-export" onclick="exportData()">
      <span class="nav-icon">↑</span>
      <span class="nav-label">Export</span>
    </button>
  </div>

</div>

// ── STORAGE ────────────────────────────────────────────────────────────────────
const DB_KEY = 'sns_props_v1';

function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || {}; }
  catch { return {}; }
}
function saveDB(db) {
  try { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
  catch(e) { console.warn('Storage full:', e); }
}
function getPropData(id) {
  const db = loadDB();
  return db[id] || { userNotes:'', directives:'', questionsList:[], spentDollars:'', actualHrs:'', refImgs:[], srcImgs:[] };
}
function setPropData(id, data) {
  const db = loadDB();
  db[id] = data;
  saveDB(db);
}

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentSearch = '';
let currentView   = 'list'; // 'list' | 'detail' | 'dash'
let currentPropId = null;
let saveTimer     = null;

// ── STATUS HELPERS ─────────────────────────────────────────────────────────────
function statusKey(s) {
  s = s.toLowerCase();
  if (s.includes('needed')) return 'needed';
  if (s.includes('pull')) return 'pull';
  if (s.includes('various')) return 'various';
  return 'tbd';
}
function statusColor(s) {
  const k = statusKey(s);
  return { needed:'#9B2C2C', pull:'#2D5A3D', various:'#4A3566', tbd:'#8A6425' }[k];
}
function statusChipClass(s) {
  return { needed:'chip-status-needed', pull:'chip-status-pull', various:'chip-status-various', tbd:'chip-status-tbd' }[statusKey(s)];
}

// ── FILTER / SEARCH ────────────────────────────────────────────────────────────
function onSearch(v) { currentSearch = v.toLowerCase(); renderList(); }
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function filteredProps() {
  const db = loadDB();
  return PROPS_DATA.filter(p => {
    if (currentSearch) {
      const hay = (p.name + p.group + p.notes + p.status).toLowerCase();
      if (!hay.includes(currentSearch)) return false;
    }
    const d = db[p.id] || {};
    switch(currentFilter) {
      case 'needed':    return statusKey(p.status) === 'needed';
      case 'pull':      return statusKey(p.status) === 'pull';
      case 'noted':     return !!(d.userNotes || d.directives || (d.questionsList&&d.questionsList.length));
      case 'photos':    return !!(d.refImgs?.length || d.srcImgs?.length);
      case 'questions': return !!(d.questionsList&&d.questionsList.length);
      case 'FURNITURE': return p.section === 'FURNITURE';
      case 'PROPS':     return p.section === 'PROPS';
      default:          return true;
    }
  });
}

// ── RENDER LIST ────────────────────────────────────────────────────────────────
function renderList() {
  const props = filteredProps();
  const db = loadDB();
  const el = document.getElementById('list-view');

  if (!props.length) {
    el.innerHTML = '<div class="empty-state">No props match this filter.</div>';
    return;
  }

  // Group by section → group
  const grouped = {};
  props.forEach(p => {
    const key = p.section + '||' + p.group;
    if (!grouped[key]) grouped[key] = { section: p.section, group: p.group, items: [] };
    grouped[key].items.push(p);
  });

  let html = '';
  let lastSection = null;
  Object.values(grouped).forEach(({ section, group, items }) => {
    if (section !== lastSection) {
      html += `<div class="section-header">${section}</div>`;
      lastSection = section;
    }
    if (group && group !== 'FURNITURE — BOTH ACTS' && group !== 'Individual') {
      html += `<div class="group-header">${group}</div>`;
    }
    items.forEach(p => {
      const d = db[p.id] || {};
      const hasData = !!(d.userNotes || d.directives || (d.questionsList&&d.questionsList.length) || d.refImgs?.length || d.srcImgs?.length || d.spentDollars || d.actualHrs);
      const effectiveStatus = d.userStatus || p.status;
      const dot = statusColor(effectiveStatus);
      const noteInd  = (d.userNotes || d.directives || (d.questionsList&&d.questionsList.length)) ? 'active' : '';
      const photoInd = (d.refImgs?.length || d.srcImgs?.length) ? 'active' : '';
      const qInd     = (d.questionsList&&d.questionsList.length) ? 'active' : '';
      html += `
        <div class="prop-row${hasData?' has-data':''}" onclick="openProp('${p.id}')">
          <div class="prop-status-dot" style="background:${dot}"></div>
          <div style="flex:1;min-width:0">
            <div class="prop-name">${p.name}</div>
            <div class="prop-meta">qty ${p.qty} · ${p.budget}</div>
          </div>
          <div class="prop-indicators">
            <span class="ind ${noteInd}" title="Notes">✎</span>
            <span class="ind ${photoInd}" title="Photos">◻</span>
            <span class="ind ${qInd}" title="Questions">?</span>
          </div>
          <span class="prop-chevron">›</span>
        </div>`;
    });
  });
  el.innerHTML = html;
}

// ── OPEN PROP DETAIL ───────────────────────────────────────────────────────────
function openProp(id) {
  currentPropId = id;
  currentView = 'detail';
  const prop = PROPS_DATA.find(p => p.id === id);
  const data = getPropData(id);
  renderDetail(prop, data);
  document.getElementById('list-view').style.display      = 'none';
  document.getElementById('detail-view').style.display    = 'block';
  document.getElementById('dash-view').style.display      = 'none';
  document.getElementById('questions-view').style.display = 'none';
  document.getElementById('search-bar').style.display  = 'none';
  document.getElementById('filter-bar').style.display  = 'none';
  document.getElementById('header-back').style.display = 'block';
  document.getElementById('header-title').textContent  = prop.name.length > 28
    ? prop.name.slice(0,25)+'…' : prop.name;
  document.getElementById('header-sub').textContent = prop.group;
  document.getElementById('detail-view').scrollTop = 0;
  updateNav('list');
}

function renderDetail(prop, data) {

  const STATUS_OPTIONS = [
    { label: 'Needed',             value: 'Needed',                    cls: 'chip-status-needed'  },
    { label: 'Potentially Pull Stock', value: 'Potentially Pull Stock', cls: 'chip-status-pull'    },
    { label: 'Pull Stock — Confirmed', value: 'Pull Stock — Confirmed', cls: 'chip-status-pull'    },
    { label: 'Sourced',            value: 'Sourced',                   cls: 'chip-status-pull'    },

    { label: 'TBD',                value: 'TBD',                       cls: 'chip-status-tbd'     },

  const statusPickerHTML = STATUS_OPTIONS.map(opt => {
    const bg = { 'chip-status-needed':'#9B2C2C','chip-status-pull':'#2D5A3D','chip-status-various':'#4A3566','chip-status-tbd':'#8A6425' }[opt.cls];
    const sel = currentStatus === opt.value ? ' selected' : '';
    return `<button class="status-opt${sel}" style="background:${bg};color:white"

  }).join('');

  const el = document.getElementById('detail-view');
  el.innerHTML = `
    <div class="detail-hero">
      <div class="detail-group-label">${prop.section} · ${prop.group}</div>
      <div class="detail-name">${prop.name}</div>
      <div class="detail-chips">
        <span class="chip chip-info">qty ${prop.qty}</span>
        <span class="chip chip-info">${shortBudget}</span>
        <span class="chip chip-info">${prop.hrs} shop hrs</span>
      </div>
    </div>

    <div class="detail-body">

      <!-- STATUS PICKER -->
      <div class="detail-card">
        <div class="detail-card-header">Status</div>
        <div class="status-picker">${statusPickerHTML}</div>
      </div>

      ${prop.notes ? `
      <div class="detail-card">
        <div class="detail-card-header">Notes from prop list</div>
        <div class="detail-notes-text">${prop.notes}</div>
      </div>` : ''}

      <div class="detail-card">
        <div class="fields-row">
          <div class="field-half">
            <label class="field-label">$ Spent (actual)</label>
            <input class="field-inline" type="text" inputmode="decimal"
              placeholder="—" value="${data.spentDollars||''}"
              oninput="fieldChange('spentDollars', this.value)">
          </div>
          <div class="field-half">
            <label class="field-label">Actual Shop Hours</label>
            <input class="field-inline" type="text" inputmode="decimal"
              placeholder="—" value="${data.actualHrs||''}"
              oninput="fieldChange('actualHrs', this.value)">
          </div>
        </div>
      </div>

      <div class="detail-card">
        <label class="field-label">My Notes</label>
        <textarea class="field-input" placeholder="Add your notes here…"
          oninput="fieldChange('userNotes', this.value)"
          rows="4">${data.userNotes||''}</textarea>
      </div>

      <div class="detail-card">
        <label class="field-label">Directives</label>
        <textarea class="field-input" placeholder="Directives from director / designer…"
          oninput="fieldChange('directives', this.value)"
          rows="3">${data.directives||''}</textarea>
      </div>

      <div class="detail-card">
        <div class="img-zone-label">
          <span>Questions &amp; Clarifications</span>
          <button class="img-zone-add-btn" onclick="addQuestion()">+ Question</button>
        </div>
        <div class="q-card-list" id="q-card-list">
          ${renderQuestionCards(data.questionsList||[])}
        </div>
      </div>

      <!-- REFERENCE IMAGE ZONE -->
      <div class="detail-card">
        <div class="img-zone-label">
          <span>Inspiration / Reference / Sketch</span>
          <button class="img-zone-add-btn" onclick="triggerImgUpload('ref')">+ Add</button>
        </div>
        <div class="img-zone-wrap">
          <div id="ref-grid" class="${data.refImgs?.length ? 'img-grid' : 'img-grid empty'}">
            ${renderImgGrid(data.refImgs||[], 'ref')}
          </div>
        </div>
        <input class="img-file-input" id="ref-file" type="file"
          accept="image/*" multiple capture="environment"
          onchange="handleImgs(this,'ref')">
      </div>

      <!-- SOURCING IMAGE ZONE -->
      <div class="detail-card">
        <div class="img-zone-label">
          <span style="color:#C9963A">Sourcing Options — Pick From These</span>
          <button class="img-zone-add-btn" style="background:#8A6425" onclick="triggerImgUpload('src')">+ Add</button>
        </div>
        <div class="img-zone-wrap">
          <div id="src-grid" class="${data.srcImgs?.length ? 'img-grid' : 'img-grid empty'}">
            ${renderImgGrid(data.srcImgs||[], 'src')}

          accept="image/*" multiple
          onchange="handleImgs(this,'src')">
      </div>

    </div>`;
}

function renderImgGrid(imgs, zone) {
  if (!imgs.length) return '<span class="img-placeholder-text">Tap + Add to upload</span>';
  return imgs.map((src, i) => `
    <div class="img-thumb-wrap">
      <img class="img-thumb" src="${src}" loading="lazy">
      <button class="img-del" onclick="deleteImg('${zone}',${i})">×</button>
    </div>`).join('');
}

function triggerImgUpload(zone) {
  document.getElementById(zone + '-file').click();
}

async function handleImgs(input, zone) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const data = getPropData(currentPropId);
  const key = zone === 'ref' ? 'refImgs' : 'srcImgs';
  if (!data[key]) data[key] = [];

  for (const file of files) {
    const b64 = await compressImage(file, 800, 0.72);
    data[key].push(b64);
  }
  setPropData(currentPropId, data);
  refreshImgGrid(zone, data[key]);
  input.value = '';
  showToast();
}

function deleteImg(zone, idx) {
  const data = getPropData(currentPropId);
  const key = zone === 'ref' ? 'refImgs' : 'srcImgs';
  data[key].splice(idx, 1);
  setPropData(currentPropId, data);
  refreshImgGrid(zone, data[key]);
  showToast();
}

function refreshImgGrid(zone, imgs) {
  const grid = document.getElementById(zone + '-grid');
  if (!grid) return;
  grid.className = imgs.length ? 'img-grid' : 'img-grid empty';
  grid.innerHTML = renderImgGrid(imgs, zone);
}

// Compress image to base64
function compressImage(file, maxDim, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = h * maxDim / w; w = maxDim; }
          else       { w = w * maxDim / h; h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── FIELD AUTOSAVE ─────────────────────────────────────────────────────────────
function setStatus(value) {
  const data = getPropData(currentPropId);
  data.userStatus = value;
  setPropData(currentPropId, data);
  // Update picker UI without full re-render
  document.querySelectorAll('.status-opt').forEach(btn => {
    btn.classList.toggle('selected', btn.textContent.trim().toLowerCase() === value.toLowerCase());
  });
  showToast();
}

function fieldChange(field, value) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const data = getPropData(currentPropId);
    data[field] = value;
    setPropData(currentPropId, data);
    showToast();
  }, 600);
}

function showToast() {
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

const RECIPIENTS = ['Scenic Designer','Scenic Tech','Costumes','Director','Advisor','Other'];

function recipientOptions(selected) {
  return `<option value="">— who? —</option>` +
    RECIPIENTS.map(r =>
      `<option value="${r}" ${selected===r?'selected':''}>${r}</option>`
    ).join('');
}

function renderQuestionCards(list) {
  if (!list.length) {
    return `<button class="q-add-btn" onclick="addQuestion()">+ Add a question</button>`;
  }
  return list.map((q, i) => `
    <div class="q-card" id="qcard-${i}">
      <div class="q-card-header">
        <select class="q-card-select" onchange="updateQuestion(${i},'recipient',this.value)">
          ${recipientOptions(q.recipient)}
        </select>
        <button class="q-card-del" onclick="deleteQuestion(${i})">×</button>
      </div>
      <textarea class="q-card-textarea"
        placeholder="Type your question…"
        oninput="updateQuestion(${i},'text',this.value)"
        rows="3">${q.text||''}</textarea>
    </div>`).join('') +
    `<button class="q-add-btn" onclick="addQuestion()">+ Add another question</button>`;
}

function addQuestion() {
  const data = getPropData(currentPropId);
  if (!data.questionsList) data.questionsList = [];
  data.questionsList.push({ id: Date.now(), text: '', recipient: '' });
  setPropData(currentPropId, data);
  const el = document.getElementById('q-card-list');
  if (el) el.innerHTML = renderQuestionCards(data.questionsList);
  const textareas = el.querySelectorAll('.q-card-textarea');
  if (textareas.length) textareas[textareas.length-1].focus();
  showToast();
}

function deleteQuestion(idx) {
  const data = getPropData(currentPropId);
  data.questionsList.splice(idx, 1);
  setPropData(currentPropId, data);
  const el = document.getElementById('q-card-list');
  if (el) el.innerHTML = renderQuestionCards(data.questionsList);
  showToast();
}

function updateQuestion(idx, field, value) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const data = getPropData(currentPropId);
    if (!data.questionsList || !data.questionsList[idx]) return;
    data.questionsList[idx][field] = value;
    setPropData(currentPropId, data);
    showToast();
  }, 500);
}

function showQuestions() {
  currentView = 'questions';
  currentPropId = null;
  document.getElementById('list-view').style.display      = 'none';
  document.getElementById('detail-view').style.display    = 'none';
  document.getElementById('dash-view').style.display      = 'none';
  document.getElementById('questions-view').style.display = 'block';
  document.getElementById('search-bar').style.display     = 'none';
  document.getElementById('filter-bar').style.display     = 'none';
  document.getElementById('header-back').style.display    = 'none';
  document.getElementById('header-title').textContent     = 'Questions';
  document.getElementById('header-sub').textContent       = 'Grouped by recipient';
  renderQuestions();
  updateNav('questions');
}

function renderQuestions() {
  const db = loadDB();
  const grouped = {};
  RECIPIENTS.forEach(r => grouped[r] = []);

  PROPS_DATA.forEach(p => {
    const d = db[p.id] || {};
    const ql = d.questionsList || [];
    ql.forEach(q => {
      if (!q.text || !q.text.trim()) return;
      const r = q.recipient || 'Other';
      if (!grouped[r]) grouped[r] = [];
      grouped[r].push({ prop: p, text: q.text.trim() });
    });
  });

  const hasAny = RECIPIENTS.some(r => grouped[r].length > 0);
  const el = document.getElementById('questions-view');

  if (!hasAny) {
    el.innerHTML = `
      <div class="q-empty">
        <div class="q-empty-icon">✉</div>
        No questions logged yet.<br>
        Open any prop and tap <strong>+ Question</strong><br>to add one.
      </div>`;
    return;
  }

  let html = '';
  RECIPIENTS.forEach(recipient => {
    const items = grouped[recipient];
    if (!items.length) return;
    html += `
      <div class="q-recipient-block">
        <div class="q-recipient-header">
          <span>${recipient} <span style="opacity:0.5;font-weight:400">(${items.length})</span></span>
          <button class="q-email-btn" onclick="emailRecipient('${recipient}')">✉ Email</button>
        </div>
        ${items.map(({prop, text}) => `
          <div class="q-item" onclick="openProp('${prop.id}')">
            <div class="q-prop-name">${prop.name}</div>
            <div class="q-text">${text}</div>
          </div>`).join('')}
      </div>`;
  });
  el.innerHTML = html;
}

function emailRecipient(recipient) {
  const db = loadDB();
  const items = [];
  PROPS_DATA.forEach(p => {
    const d = db[p.id] || {};
    const ql = d.questionsList || [];
    ql.forEach(q => {
      if (!q.text || !q.text.trim()) return;
      if ((q.recipient || 'Other') !== recipient) return;
      items.push({ name: p.name, text: q.text.trim() });
    });
  });
  if (!items.length) return;

  const subject = encodeURIComponent(`S&S Props — Questions for ${recipient}`);
  const lines = items.map(({name, text}) => `PROP: ${name}\n${text}`).join('\n\n---\n\n');
  const body = encodeURIComponent(
    `Hi,\n\nI have the following prop questions for you regarding Sense & Sensibility:\n\n---\n\n${lines}\n\n---\n\nThanks!\nNoah`
  );
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function updateNav(active) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { list:'nav-list', dash:'nav-dash', questions:'nav-questions' };
  if (map[active]) document.getElementById(map[active])?.classList.add('active');
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────────
function renderDash() {
  const db = loadDB();
  const total    = PROPS_DATA.length;
  const needed   = PROPS_DATA.filter(p => { const d=db[p.id]||{}; return statusKey(d.userStatus||p.status) === 'needed'; }).length;
  const withNotes= PROPS_DATA.filter(p => { const d=db[p.id]||{}; return !!(d.userNotes||d.directives||(d.questionsList&&d.questionsList.length)); }).length;
  const withImgs = PROPS_DATA.filter(p => { const d=db[p.id]||{}; return !!(d.refImgs?.length||d.srcImgs?.length); }).length;
  const withQ    = PROPS_DATA.filter(p => { const d=db[p.id]||{}; return !!(d.questionsList&&d.questionsList.some(q=>q.text&&q.text.trim())); }).length;
  const withSpent= PROPS_DATA.filter(p => { const d=db[p.id]||{}; return !!d.spentDollars; }).length;

  // Items with open questions
  const openQ = PROPS_DATA.filter(p => { const d=db[p.id]||{}; return !!(d.questionsList&&d.questionsList.some(q=>q.text&&q.text.trim())); });
  // Needed props without notes or photos
  const needingAttention = PROPS_DATA.filter(p => {
    const d=db[p.id]||{};
    if (statusKey(d.userStatus||p.status) !== 'needed') return false;
    return !(d.userNotes||d.refImgs?.length||d.srcImgs?.length);
  }).slice(0, 8);

  const el = document.getElementById('dash-view');
  el.innerHTML = `
    <div class="dash-title">Production Overview</div>
    <div class="dash-stat-grid">
      <div class="dash-stat highlight">
        <div class="dash-stat-num">${total}</div>
        <div class="dash-stat-label">Total Props</div>
      </div>
      <div class="dash-stat highlight">
        <div class="dash-stat-num">${needed}</div>
        <div class="dash-stat-label">Needed</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-num">${withNotes}</div>
        <div class="dash-stat-label">With Notes</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-num">${withImgs}</div>
        <div class="dash-stat-label">With Photos</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-num">${withQ}</div>
        <div class="dash-stat-label">Open Qs</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-num">${withSpent}</div>
        <div class="dash-stat-label">Costs Logged</div>
      </div>
    </div>

    ${openQ.length ? `
    <div class="dash-section-title">Open Questions (${openQ.length})</div>
    ${openQ.slice(0,10).map(p => {
      const d=db[p.id]||{};
      return `
      <div class="dash-item" onclick="openProp('${p.id}')">
        <div class="prop-status-dot" style="background:${statusColor(d.userStatus||p.status)}"></div>
        <div class="dash-item-name">${p.name}</div>
        <div class="dash-item-tag">${(d.questionsList||[]).filter(q=>q.text).length} Q</div>
      </div>`;}).join('')}
    ` : ''}

    ${needingAttention.length ? `
    <div class="dash-section-title">Needed — No Notes Yet (${needingAttention.length})</div>
    ${needingAttention.map(p => `
      <div class="dash-item" onclick="openProp('${p.id}')">
        <div class="prop-status-dot" style="background:#9B2C2C"></div>
        <div class="dash-item-name">${p.name}</div>
        <div class="dash-item-tag">${p.budget}</div>
      </div>`).join('')}
    ` : ''}

    <button class="export-btn" onclick="exportData()">↑ Export All Data</button>
  `;
}

// ── EXPORT ─────────────────────────────────────────────────────────────────────
function exportData() {
  const db = loadDB();
  const out = PROPS_DATA.map(p => {
    const d = db[p.id] || {};
    return {
      name:      p.name,
      section:   p.section,
      group:     p.group,
      origStatus:p.status,
      status:    d.userStatus || p.status,
      qty:       p.qty,
      budget:    p.budget,
      hrs:       p.hrs,
      userNotes: d.userNotes    || '',
      directives:d.directives   || '',
      questions: (d.questionsList||[]).filter(q=>q.text).map(q=>`[${q.recipient||'Other'}] ${q.text}`).join(' | ') || '',
      spentDollars: d.spentDollars || '',
      actualHrs: d.actualHrs    || '',
      refImgCount:  (d.refImgs  || []).length,
      srcImgCount:  (d.srcImgs  || []).length,
    };
  });

  const csv = [
    ['Name','Section','Group','Original Status','Current Status','Qty','Budget','Shop Hrs',
     'My Notes','Directives','Questions','$ Spent','Actual Hrs',
     'Ref Photos','Sourcing Photos'].join(','),
    ...out.map(r => [
      r.name, r.section, r.group, r.origStatus, r.status, r.qty, r.budget, r.hrs,
      r.userNotes, r.directives, r.questions, r.spentDollars, r.actualHrs,
      r.refImgCount, r.srcImgCount
    ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(','))
  ].join('\n');

  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'SenseAndSensibility_Props_Export.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
renderList();
</script>
