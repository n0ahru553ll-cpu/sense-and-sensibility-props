<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S&S Props">
<meta name="theme-color" content="#12100E">
<title>S&S Props</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#12100E;--parchment:#F5EFE0;--cream:#FAF6EC;--gold:#C9963A;--gold-dim:#8A6425;--red:#9B2C2C;--green:#2D5A3D;--purple:#4A3566;--muted:#7A7060;--border:#DDD4B8;--card:#FFFDF6;--shadow:rgba(18,16,14,.12);--safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--ink);font-family:'DM Mono',monospace;color:var(--ink);overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh;background:var(--cream)}
/* HEADER */
#header{background:var(--ink);padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:2px solid var(--gold)}
#header-back{color:var(--gold);font-size:20px;background:none;border:none;cursor:pointer;padding:4px 8px 4px 0;display:none;line-height:1}
#header-title{flex:1;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--parchment);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#header-sub{font-size:9px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.icon-btn{background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer;padding:4px;line-height:1;border-radius:4px}
/* SYNC */
#sync-bar{background:var(--ink);border-bottom:1px solid #2A2520;padding:0 16px;display:flex;align-items:center;gap:6px;flex-shrink:0;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
#sync-bar.visible{max-height:26px;padding:4px 16px}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
.sync-text{font-size:9px;letter-spacing:.08em;color:#6B5F4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* SEARCH */
#search-bar{background:var(--ink);padding:0 16px 10px;flex-shrink:0}
#search-input{width:100%;background:#1E1B17;border:1px solid #3A3228;border-radius:8px;color:var(--parchment);font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;outline:none}
#search-input::placeholder{color:#6B5F4A}
#search-input:focus{border-color:var(--gold)}
#filter-bar{background:var(--ink);padding:0 16px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#filter-bar::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;border-radius:100px;border:1px solid #3A3228;background:#1E1B17;color:#8A7A62;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;padding:5px 11px;cursor:pointer;flex-shrink:0}
.pill.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
/* LIST */
#list-view{flex:1;overflow-y:auto;padding:8px 12px calc(var(--safe-bot) + 16px)}
.section-header{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:16px 4px 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.group-header{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-dim);padding:10px 4px 4px}
.prop-row{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:10px;margin-bottom:5px;padding:11px 12px;box-shadow:0 1px 3px var(--shadow);cursor:pointer;border:1px solid transparent;-webkit-user-select:none;user-select:none}
.prop-row:active{transform:scale(.98)}
.prop-row.has-data{border-color:var(--gold)}
.prop-row.complete{opacity:.55;border-color:var(--green)}
.prop-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.prop-name{flex:1;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;line-height:1.2;color:var(--ink)}
.prop-meta{font-size:9px;color:var(--muted);margin-top:1px}
.prop-indicators{display:flex;gap:4px;align-items:center}
.ind{font-size:11px;opacity:.5}.ind.active{opacity:1}
.prop-chevron{color:var(--border);font-size:13px;flex-shrink:0}
/* DETAIL */
#detail-view{display:none;flex:1;overflow-y:auto;padding:0 0 calc(var(--safe-bot) + 80px)}
.detail-hero{background:var(--ink);padding:16px;border-bottom:1px solid var(--gold)}
.detail-group-label{font-size:9px;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--parchment);line-height:1.1;margin-bottom:12px}
.detail-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:100px;font-weight:500}
.chip-needed{background:var(--red);color:#FFE4E4}.chip-pull,.chip-complete{background:var(--green);color:#D4FFE4}
.chip-various{background:var(--purple);color:#EAD4FF}.chip-tbd{background:var(--gold-dim);color:#FFF0CC}
.chip-info{background:#2A2520;color:#A89880}
.detail-body{padding:14px 14px 0}
.detail-card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.detail-card-header{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:10px 14px 0}
.detail-notes-text{font-family:'Cormorant Garamond',serif;font-size:15px;line-height:1.55;color:var(--ink);padding:6px 14px 12px;font-style:italic}
.field-byline{font-size:8px;color:var(--muted);padding:2px 14px 8px;letter-spacing:.04em}
.field-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:10px 14px 4px;display:block}
.field-input{width:100%;background:transparent;border:none;border-top:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ink);line-height:1.55;padding:10px 14px;resize:none;outline:none;min-height:80px}
.field-input::placeholder{color:var(--border);font-style:italic}
.field-input:focus{background:#FFFEF8}
.fields-row{display:flex}
.fields-row .field-half{flex:1}.fields-row .field-half+.field-half{border-left:1px solid var(--border)}
.field-inline{width:100%;background:transparent;border:none;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);padding:10px 14px;outline:none}
.field-inline::placeholder{color:var(--border)}.field-inline:focus{background:#FFFEF8}
/* STATUS PICKER */
.status-picker{display:flex;flex-wrap:wrap;gap:7px;padding:12px 16px 14px}
.status-opt{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border-radius:100px;font-weight:500;border:2px solid transparent;cursor:pointer;opacity:.38;font-family:'DM Mono',monospace}
.status-opt.selected{opacity:1;border-color:rgba(255,255,255,.7)}
/* COMPLETE */
.complete-btn{width:100%;background:transparent;border:none;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--muted);padding:12px 14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px}
.complete-btn.done{color:var(--green)}
.cbx{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.complete-btn.done .cbx{background:var(--green);border-color:var(--green);color:white}
/* IMAGES */
.img-zone-wrap{padding:0 14px 14px}
.img-zone-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:10px 14px 8px;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.img-zone-add-btn{background:var(--gold);color:var(--ink);border:none;border-radius:100px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;padding:4px 12px;cursor:pointer}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;min-height:80px}
.img-grid.empty{background:var(--parchment);border-radius:8px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;min-height:80px;grid-template-columns:unset}
.img-placeholder-text{font-size:10px;color:var(--border);letter-spacing:.06em;text-transform:uppercase}
.img-thumb-wrap{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:var(--parchment)}
.img-thumb{width:100%;height:100%;object-fit:cover;display:block}
.img-del{position:absolute;top:3px;right:3px;background:rgba(18,16,14,.75);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-file-input{display:none}
/* QUESTIONS */
.q-card-list{padding:8px 14px 14px;display:flex;flex-direction:column;gap:8px}
.q-card{background:var(--parchment);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.q-card.resolved{opacity:.45}
.q-card-header{display:flex;align-items:center;gap:8px;padding:8px 10px 0;justify-content:space-between}
.q-card-select{flex:1;background:transparent;border:none;font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;letter-spacing:.04em}
.q-card-actions{display:flex;gap:4px;align-items:center}
.q-resolve-btn{background:none;border:1px solid var(--border);border-radius:100px;color:var(--muted);font-size:9px;font-family:'DM Mono',monospace;padding:2px 7px;cursor:pointer}
.q-resolve-btn.done{background:var(--green);border-color:var(--green);color:white}
.q-card-del{background:none;border:none;color:var(--border);font-size:16px;cursor:pointer;padding:0 2px;line-height:1}
.q-card-del:active{color:var(--red)}
.q-card-textarea{width:100%;background:transparent;border:none;border-top:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--ink);line-height:1.5;padding:8px 10px;resize:none;outline:none;min-height:64px}
.q-card-textarea:focus{background:#FFFEF8}
.q-card-byline{font-size:8px;color:var(--muted);padding:2px 10px 6px;letter-spacing:.04em;border-top:1px solid var(--border)}
.q-add-btn{width:100%;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--gold-dim);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;padding:10px;cursor:pointer;margin-top:2px}
.share-btn{width:100%;background:transparent;border:none;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--gold-dim);padding:12px 14px;cursor:pointer;text-align:left}
/* TOAST */
#save-toast{position:fixed;bottom:calc(var(--safe-bot) + 70px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#D4FFE4;font-size:11px;letter-spacing:.08em;padding:8px 18px;border-radius:100px;opacity:0;transition:all .3s;pointer-events:none;z-index:100;white-space:nowrap}
#save-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* NAV */
#bottom-nav{background:var(--ink);border-top:1px solid #2A2520;padding:10px 0 calc(var(--safe-bot) + 6px);display:grid;grid-template-columns:repeat(4,1fr);flex-shrink:0}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#5A4E3C;padding:4px;font-family:'DM Mono',monospace}
.nav-btn.active{color:var(--gold)}
.nav-icon{font-size:18px;line-height:1}.nav-label{font-size:8px;letter-spacing:.08em;text-transform:uppercase}
/* DASH */
#dash-view{display:none;flex:1;overflow-y:auto;padding:14px 14px calc(var(--safe-bot) + 20px)}
.dash-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:14px}
.dash-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dash-stat{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;text-align:center}
.dash-stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--ink);line-height:1}
.dash-stat-label{font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-top:4px}
.dash-stat.highlight{background:var(--ink);border-color:var(--gold)}.dash-stat.highlight .dash-stat-num{color:var(--gold)}.dash-stat.highlight .dash-stat-label{color:#8A7A62}
.dash-section-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.dash-item{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:10px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px}
.dash-item-name{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;flex:1;line-height:1.2}
.dash-item-tag{font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:100px;background:var(--parchment);color:var(--muted);flex-shrink:0}
.dash-btns{display:flex;gap:8px;margin-top:16px}
.export-btn{flex:1;background:var(--ink);color:var(--gold);border:1px solid var(--gold);border-radius:10px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;padding:14px;cursor:pointer}
/* QUESTIONS VIEW */
#questions-view{display:none;flex:1;overflow-y:auto;padding:0 0 calc(var(--safe-bot) + 20px)}
.q-recipient-block{margin-bottom:4px}
.q-recipient-header{background:var(--ink);color:var(--gold);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid #2A2520}
.q-email-btn{background:var(--gold);color:var(--ink);border:none;border-radius:100px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.06em;padding:5px 13px;cursor:pointer}
.q-item{background:var(--card);border-bottom:1px solid var(--border);padding:11px 16px;cursor:pointer}
.q-prop-name{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:3px}
.q-text{font-size:13px;color:var(--ink);line-height:1.45}
.q-item-byline{font-size:8px;color:var(--muted);margin-top:3px}
.q-empty{text-align:center;padding:60px 24px;color:var(--muted);font-size:12px;line-height:1.7}
.q-empty-icon{font-size:32px;margin-bottom:10px;opacity:.3}
/* ADD PROP MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(18,16,14,.85);z-index:200;align-items:flex-end}
#modal-overlay.open{display:flex}
#modal-box{background:var(--cream);border-radius:20px 20px 0 0;padding:20px 16px calc(var(--safe-bot) + 24px);width:100%;max-height:90dvh;overflow-y:auto}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
.modal-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);outline:none}
.modal-input:focus{border-color:var(--gold)}
.modal-select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);outline:none;appearance:none}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-save{flex:1;background:var(--ink);color:var(--gold);border:none;border-radius:10px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;cursor:pointer}
.modal-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer}
/* IDENTITY */
#identity-overlay{display:none;position:fixed;inset:0;background:rgba(18,16,14,.95);z-index:300;align-items:center;justify-content:center;padding:24px}
#identity-overlay.open{display:flex}
#identity-box{background:var(--cream);border-radius:16px;padding:28px 20px;width:100%;max-width:380px}
.identity-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-bottom:6px}
.identity-sub{font-size:11px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.identity-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.identity-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 8px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.06em;cursor:pointer;color:var(--ink);text-align:center}
.identity-btn.selected{background:var(--ink);color:var(--gold);border-color:var(--gold)}
.identity-confirm{width:100%;background:var(--ink);color:var(--gold);border:1px solid var(--gold);border-radius:10px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;cursor:pointer}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="header-back" onclick="showList()">&#8249;</button>
    <div style="flex:1;min-width:0"><div id="header-title">Sense &amp; Sensibility</div><div id="header-sub">Props Design &amp; Management</div></div>
    <div style="display:flex;gap:6px"><button class="icon-btn" id="add-prop-btn" onclick="openAddProp()" style="display:none" title="Add prop">&#xff0b;</button></div>
  </div>
  <div id="sync-bar"><div class="sync-dot" id="sync-dot"></div><span class="sync-text" id="sync-text"></span></div>
  <div id="search-bar"><input id="search-input" type="search" placeholder="Search props&#8230;" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off"></div>
  <div id="filter-bar">
    <button class="pill active" onclick="setFilter('all',this)">All</button>
    <button class="pill" onclick="setFilter('needed',this)">Needed</button>
    <button class="pill" onclick="setFilter('pull',this)">Pull Stock</button>
    <button class="pill" onclick="setFilter('complete',this)">Complete</button>
    <button class="pill" onclick="setFilter('noted',this)">Has Notes</button>
    <button class="pill" onclick="setFilter('photos',this)">Has Photos</button>
    <button class="pill" onclick="setFilter('questions',this)">Has Questions</button>
    <button class="pill" onclick="setFilter('FURNITURE',this)">Furniture</button>
    <button class="pill" onclick="setFilter('PROPS',this)">Props</button>
  </div>
  <div id="list-view"><div style="text-align:center;padding:40px;color:var(--muted);font-size:12px">Loading props&#8230;</div></div>
  <div id="detail-view"></div>
  <div id="dash-view"></div>
  <div id="questions-view"></div>
  <div id="save-toast">&#10003; Saved</div>
  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-list" onclick="showList()"><span class="nav-icon">&#9776;</span><span class="nav-label">Props</span></button>
    <button class="nav-btn" id="nav-questions" onclick="showQuestions()"><span class="nav-icon">&#9993;</span><span class="nav-label">Questions</span></button>
    <button class="nav-btn" id="nav-dash" onclick="showDash()"><span class="nav-icon">&#9672;</span><span class="nav-label">Dashboard</span></button>
    <button class="nav-btn" id="nav-export" onclick="exportData()"><span class="nav-icon">&#8593;</span><span class="nav-label">Export</span></button>
  </div>
</div>

<!-- ADD PROP -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div class="modal-title">Add New Prop</div>
    <div class="modal-field"><label class="modal-label">Prop Name</label><input class="modal-input" id="np-name" placeholder="e.g. Hand Mirror"></div>
    <div class="modal-field"><label class="modal-label">Section</label><select class="modal-select" id="np-section"><option value="PROPS">PROPS</option><option value="FURNITURE">FURNITURE</option></select></div>
    <div class="modal-field"><label class="modal-label">Group</label><input class="modal-input" id="np-group" placeholder="e.g. Individual, Books, Picnic&#8230;"></div>
    <div class="modal-field"><label class="modal-label">Status</label><select class="modal-select" id="np-status"><option value="Needed">Needed</option><option value="Potentially Pull Stock">Potentially Pull Stock</option><option value="TBD">TBD</option></select></div>
    <div style="display:flex;gap:10px">
      <div class="modal-field" style="flex:1"><label class="modal-label">Qty</label><input class="modal-input" id="np-qty" type="number" min="1" value="1"></div>
      <div class="modal-field" style="flex:2"><label class="modal-label">Budget</label><input class="modal-input" id="np-budget" placeholder="$0&#8211;$50"></div>
    </div>
    <div class="modal-field"><label class="modal-label">Shop Hours</label><input class="modal-input" id="np-hrs" type="number" step="0.5" value="0"></div>
    <div class="modal-field"><label class="modal-label">Notes</label><textarea class="modal-input" id="np-notes" rows="2" style="resize:none;min-height:60px"></textarea></div>
    <div class="modal-btns"><button class="modal-cancel" onclick="closeModal()">Cancel</button><button class="modal-save" onclick="saveNewProp()">Save Prop</button></div>
  </div>
</div>

let syncQueue={},syncTimer=null;
async function flushSync(){
  const ts={...syncQueue};syncQueue={};const ids=Object.keys(ts);if(!ids.length)return;
  setSyncStatus('syncing','Saving\u2026');
  try{
    for(const id of ids){const d=ts[id];
      await sbUpsert('prop_data',[{prop_id:id,user_notes:d.userNotes||'',user_notes_author:d.userNotesAuthor||'',user_notes_ts:d.userNotesTs||'',directives:d.directives||'',directives_author:d.directivesAuthor||'',directives_ts:d.directivesTs||'',questions_list:d.questionsList||[],spent_dollars:d.spentDollars||'',actual_hrs:d.actualHrs||'',user_status:d.userStatus||'',completed:d.completed||false,updated_at:new Date().toISOString()}]);
    }
    setSyncStatus('ok','Saved');setTimeout(hideSyncBar,2000);
  }catch(e){console.error(e);setSyncStatus('err','Save failed \u2014 retrying');Object.assign(syncQueue,ts);syncTimer=setTimeout(flushSync,5000);}
}

  setSyncStatus('syncing','Uploading images\u2026');
  try{await sbDelete('prop_images','prop_id=eq.'+pid+'&zone=eq.'+zone);if(imgs.length)await sbUpsert('prop_images',imgs.map((d,i)=>({prop_id:pid,zone,image_data:d,sort_order:i})));setSyncStatus('ok','Images saved');setTimeout(hideSyncBar,2000);}

async function loadImagesFromCloud(pid){

  catch{return{ref:[],src:[]};}
}
async function syncFromCloud(){
  setSyncStatus('syncing','Loading from cloud\u2026');
  try{
    const[rows,imgRows,masterRows]=await Promise.all([sbGet('prop_data','select=*'),sbGet('prop_images','select=prop_id,zone,image_data,sort_order&order=sort_order.asc'),sbGet('props_master','select=*&order=sort_order.asc')]);
    if(masterRows.length){PROPS_DATA=masterRows.map(r=>({id:r.prop_id,section:r.section,group:r.grp,name:r.name,qty:r.qty,status:r.status,notes:r.notes,budget:r.budget,hrs:r.hrs}));saveDBLocal({...loadDB(),__props_master:PROPS_DATA,__props_ts:Date.now()});}
    const im={};imgRows.forEach(r=>{if(!im[r.prop_id])im[r.prop_id]={ref:[],src:[]};im[r.prop_id][r.zone].push(r.image_data);});
    const db=loadDB();
    rows.forEach(r=>{db[r.prop_id]={userNotes:r.user_notes||'',userNotesAuthor:r.user_notes_author||'',userNotesTs:r.user_notes_ts||'',directives:r.directives||'',directivesAuthor:r.directives_author||'',directivesTs:r.directives_ts||'',questionsList:r.questions_list||[],spentDollars:r.spent_dollars||'',actualHrs:r.actual_hrs||'',userStatus:r.user_status||'',completed:r.completed||false,refImgs:(im[r.prop_id]||{}).ref||[],srcImgs:(im[r.prop_id]||{}).src||[]};});
    saveDBLocal(db);setSyncStatus('ok','Synced '+rows.length+' props');setTimeout(hideSyncBar,2500);return true;
  }catch(e){console.error(e);setSyncStatus('err','Offline \u2014 using local data');setTimeout(hideSyncBar,3000);return false;}
}
function setSyncStatus(state,msg){const bar=document.getElementById('sync-bar'),dot=document.getElementById('sync-dot'),text=document.getElementById('sync-text');if(!bar)return;bar.classList.add('visible');dot.className='sync-dot '+state;text.textContent=msg;}

let PROPS_DATA=[];

const TEAM=['Noah','Nisi','Veronica','Devon','Dylan','McKenzie','Kira','Other'];
const ID_KEY='sns_identity';

let pendingIdentity='';

function selectIdentity(n,btn){pendingIdentity=n;document.querySelectorAll('.identity-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');}
function confirmIdentity(){if(!pendingIdentity)return;currentUser=pendingIdentity;localStorage.setItem(ID_KEY,currentUser);document.getElementById('identity-overlay').classList.remove('open');}

function nowStamp(){return new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});}

let currentFilter='all',currentSearch='',currentView='list',currentPropId=null,saveTimer=null;
function statusKey(s){s=(s||'').toLowerCase();if(s.includes('needed'))return'needed';if(s.includes('pull'))return'pull';if(s.includes('complete'))return'complete';if(s.includes('various'))return'various';return'tbd';}
function statusColor(s){return{needed:'#9B2C2C',pull:'#2D5A3D',complete:'#2D5A3D',various:'#4A3566',tbd:'#8A6425'}[statusKey(s)];}
function statusChipCls(s){return{needed:'chip-needed',pull:'chip-pull',complete:'chip-complete',various:'chip-various',tbd:'chip-tbd'}[statusKey(s)];}

function onSearch(v){currentSearch=v.toLowerCase();renderList();}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderList();}
function filteredProps(){
  if(!PROPS_DATA.length)return[];const db=loadDB();
  return PROPS_DATA.filter(p=>{
    if(currentSearch){const h=(p.name+p.group+p.notes+p.status).toLowerCase();if(!h.includes(currentSearch))return false;}
    const d=db[p.id]||{};const es=d.userStatus||p.status;
    switch(currentFilter){
      case'needed':return statusKey(es)==='needed';case'pull':return statusKey(es)==='pull';
      case'complete':return !!(d.completed);case'noted':return !!(d.userNotes||d.directives||(d.questionsList&&d.questionsList.length));
      case'photos':return !!(d.refImgs?.length||d.srcImgs?.length);
      case'questions':return !!(d.questionsList&&d.questionsList.some(q=>q.text&&!q.resolved));
      case'FURNITURE':return p.section==='FURNITURE';case'PROPS':return p.section==='PROPS';
      default:return true;
    }
  });
}

function renderList(){
  const props=filteredProps();const db=loadDB();const el=document.getElementById('list-view');
  if(!PROPS_DATA.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:12px">Loading props from cloud\u2026</div>';return;}
  if(!props.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:12px">No props match.</div>';return;}
  const grouped={};props.forEach(p=>{const k=p.section+'||'+p.group;if(!grouped[k])grouped[k]={section:p.section,group:p.group,items:[]};grouped[k].items.push(p);});
  let html='',lastSec=null;
  Object.values(grouped).forEach(({section,group,items})=>{
    if(section!==lastSec){html+='<div class="section-header">'+section+'</div>';lastSec=section;}
    if(group&&group!=='FURNITURE \u2014 BOTH ACTS'&&group!=='Individual')html+='<div class="group-header">'+group+'</div>';
    items.forEach(p=>{
      const d=db[p.id]||{};const es=d.userStatus||p.status;
      const hasData=!!(d.userNotes||d.directives||(d.questionsList&&d.questionsList.length)||d.refImgs?.length||d.srcImgs?.length||d.spentDollars||d.actualHrs);
      const isComplete=!!(d.completed);
      const ni=(d.userNotes||d.directives)?'active':'';const pi=(d.refImgs?.length||d.srcImgs?.length)?'active':'';
      const qi=(d.questionsList&&d.questionsList.some(q=>q.text&&!q.resolved))?'active':'';
      html+='<div class="prop-row'+(hasData?' has-data':'')+(isComplete?' complete':'')+'" onclick="openProp(\''+p.id+'\')">'
        +'<div class="prop-status-dot" style="background:'+statusColor(es)+'"></div>'
        +'<div style="flex:1;min-width:0"><div class="prop-name">'+(isComplete?'\u2713 ':'')+p.name+'</div><div class="prop-meta">qty '+p.qty+' \u00b7 '+p.budget+'</div></div>'
        +'<div class="prop-indicators"><span class="ind '+ni+'" title="Notes">\u270e</span><span class="ind '+pi+'" title="Photos">\u25fb</span><span class="ind '+qi+'" title="Questions">?</span></div>'
        +'<span class="prop-chevron">\u203a</span></div>';
    });
  });
  el.innerHTML=html;
}

async function openProp(id){
  currentPropId=id;currentView='detail';
  const prop=PROPS_DATA.find(p=>p.id===id);if(!prop)return;
  const data=getPropData(id);renderDetail(prop,data);
  showView('detail');
  document.getElementById('header-back').style.display='block';
  document.getElementById('add-prop-btn').style.display='none';
  document.getElementById('header-title').textContent=prop.name.length>28?prop.name.slice(0,25)+'\u2026':prop.name;
  document.getElementById('header-sub').textContent=prop.group;
  document.getElementById('detail-view').scrollTop=0;updateNav('');
  loadImagesFromCloud(id).then(imgs=>{
    if(currentPropId!==id)return;const f=getPropData(id);let changed=false;
    if(JSON.stringify(imgs.ref)!==JSON.stringify(f.refImgs)){f.refImgs=imgs.ref;changed=true;}
    if(JSON.stringify(imgs.src)!==JSON.stringify(f.srcImgs)){f.srcImgs=imgs.src;changed=true;}
    if(changed){saveDBLocal({...loadDB(),[id]:f});refreshImgGrid('ref',f.refImgs);refreshImgGrid('src',f.srcImgs);}
  });
}

function renderDetail(prop,data){
  const es=data.userStatus||prop.status;const sb=prop.budget.replace('Potentially Pull Stock \u2014 ','');
  const SOPTS=[{l:'Needed',v:'Needed',bg:'#9B2C2C'},{l:'Potentially Pull Stock',v:'Potentially Pull Stock',bg:'#2D5A3D'},{l:'Pull Stock \u2014 Confirmed',v:'Pull Stock \u2014 Confirmed',bg:'#2D5A3D'},{l:'Sourced',v:'Sourced',bg:'#2D5A3D'},{l:'In Progress',v:'In Progress',bg:'#8A6425'},{l:'Complete',v:'Complete',bg:'#2D5A3D'},{l:'Various',v:'Various',bg:'#4A3566'},{l:'TBD',v:'TBD',bg:'#8A6425'}];
  const pills=SOPTS.map(o=>'<button class="status-opt'+(es===o.v?' selected':'')+'" style="background:'+o.bg+';color:white" onclick="setStatus(\''+o.v+'\')">'+o.l+'</button>').join('');
  const isC=!!(data.completed);
  document.getElementById('detail-view').innerHTML=
    '<div class="detail-hero">'
      +'<div class="detail-group-label">'+prop.section+' \u00b7 '+prop.group+'</div>'
      +'<div class="detail-name">'+prop.name+'</div>'
      +'<div class="detail-chips"><span class="chip '+statusChipCls(es)+'">'+es+'</span>'
      +'<span class="chip chip-info">qty '+prop.qty+'</span>'
      +'<span class="chip chip-info">'+sb+'</span>'
      +'<span class="chip chip-info">'+prop.hrs+' shop hrs</span>'
      +(isC?'<span class="chip chip-complete">\u2713 Complete</span>':'')+'</div></div>'
    +'<div class="detail-body">'
      +'<div class="detail-card"><div class="detail-card-header">Status</div><div class="status-picker">'+pills+'</div>'
      +'<button class="complete-btn'+(isC?' done':'')+'" onclick="toggleComplete()"><span class="cbx">'+(isC?'\u2713':'')+'</span>'+(isC?'Mark as Incomplete':'Mark as Complete')+'</button></div>'
      +(prop.notes?'<div class="detail-card"><div class="detail-card-header">Notes from prop list</div><div class="detail-notes-text">'+prop.notes+'</div></div>':'')
      +'<div class="detail-card"><div class="fields-row"><div class="field-half"><label class="field-label">$ Spent</label><input class="field-inline" type="text" inputmode="decimal" placeholder="\u2014" value="'+(data.spentDollars||'')+'" oninput="fieldChange(\'spentDollars\',this.value)"></div>'
      +'<div class="field-half"><label class="field-label">Actual Shop Hrs</label><input class="field-inline" type="text" inputmode="decimal" placeholder="\u2014" value="'+(data.actualHrs||'')+'" oninput="fieldChange(\'actualHrs\',this.value)"></div></div></div>'
      +'<div class="detail-card"><label class="field-label">My Notes</label><textarea class="field-input" placeholder="Add your notes here\u2026" oninput="fieldChange(\'userNotes\',this.value)" rows="4">'+(data.userNotes||'')+'</textarea>'
      +(data.userNotesAuthor?'<div class="field-byline" id="notes-byline">\u2014 '+data.userNotesAuthor+(data.userNotesTs?' \u00b7 '+data.userNotesTs:'')+'</div>':'<div class="field-byline" id="notes-byline"></div>')+'</div>'
      +'<div class="detail-card"><label class="field-label">Directives</label><textarea class="field-input" placeholder="Directives from director / designer\u2026" oninput="fieldChange(\'directives\',this.value)" rows="3">'+(data.directives||'')+'</textarea>'
      +(data.directivesAuthor?'<div class="field-byline" id="dir-byline">\u2014 '+data.directivesAuthor+(data.directivesTs?' \u00b7 '+data.directivesTs:'')+'</div>':'<div class="field-byline" id="dir-byline"></div>')+'</div>'
      +'<div class="detail-card"><div class="img-zone-label"><span>Inspiration / Reference / Sketch</span><button class="img-zone-add-btn" onclick="triggerImgUpload(\'ref\')">+ Add</button></div>'
      +'<div class="img-zone-wrap"><div id="ref-grid" class="'+(data.refImgs?.length?'img-grid':'img-grid empty')+'">'+(data.refImgs?.length?renderImgGrid(data.refImgs,'ref'):'<span class="img-placeholder-text">Tap + Add</span>')+'</div></div>'
      +'<input class="img-file-input" id="ref-file" type="file" accept="image/*" multiple capture="environment" onchange="handleImgs(this,\'ref\')"></div>'
      +'<div class="detail-card"><div class="img-zone-label"><span style="color:#C9963A">Sourcing Options</span><button class="img-zone-add-btn" style="background:#8A6425" onclick="triggerImgUpload(\'src\')">+ Add</button></div>'
      +'<div class="img-zone-wrap"><div id="src-grid" class="'+(data.srcImgs?.length?'img-grid':'img-grid empty')+'">'+(data.srcImgs?.length?renderImgGrid(data.srcImgs,'src'):'<span class="img-placeholder-text">Tap + Add</span>')+'</div></div>'
      +'<input class="img-file-input" id="src-file" type="file" accept="image/*" multiple onchange="handleImgs(this,\'src\')"></div>'
      +'<div class="detail-card"><div class="img-zone-label"><span>Questions &amp; Clarifications</span><button class="img-zone-add-btn" onclick="addQuestion()">+ Question</button></div>'
      +'<div class="q-card-list" id="q-card-list">'+renderQuestionCards(data.questionsList||[])+'</div></div>'
      +'<div class="detail-card"><button class="share-btn" onclick="shareCard()">\u2191 Share this prop card</button></div>'

}

const RECIPIENTS=['Scenic Designer','Scenic Tech','Costumes','Director','Advisor','Other'];
function recipientOpts(sel){return'<option value="">\u2014 who? \u2014</option>'+RECIPIENTS.map(r=>'<option value="'+r+'"'+(sel===r?' selected':'')+'>'+r+'</option>').join('');}
function renderQuestionCards(list){
  if(!list.length)return'<button class="q-add-btn" onclick="addQuestion()">+ Add a question</button>';
  return list.map((q,i)=>'<div class="q-card'+(q.resolved?' resolved':'')+'"><div class="q-card-header"><select class="q-card-select" onchange="updateQuestion('+i+',\'recipient\',this.value)">'+recipientOpts(q.recipient)+'</select>'
    +'<div class="q-card-actions"><button class="q-resolve-btn'+(q.resolved?' done':'')+'" onclick="toggleResolveQ('+i+')">'+(q.resolved?'\u2713 Resolved':'Resolve')+'</button>'
    +'<button class="q-card-del" onclick="deleteQuestion('+i+')">\xd7</button></div></div>'
    +'<textarea class="q-card-textarea" placeholder="Type your question\u2026" oninput="updateQuestion('+i+',\'text\',this.value)" rows="3"'+(q.resolved?' disabled':'')+'>'+( q.text||'')+'</textarea>'
    +(q.author?'<div class="q-card-byline">\u2014 '+q.author+(q.ts?' \u00b7 '+q.ts:'')+'</div>':'')+'</div>').join('')
    +'<button class="q-add-btn" onclick="addQuestion()">+ Add another question</button>';
}
function addQuestion(){
  const data=getPropData(currentPropId);if(!data.questionsList)data.questionsList=[];
  data.questionsList.push({id:Date.now(),text:'',recipient:'',resolved:false,author:currentUser,ts:nowStamp()});
  setPropData(currentPropId,data);
  const el=document.getElementById('q-card-list');if(el){el.innerHTML=renderQuestionCards(data.questionsList);el.querySelectorAll('.q-card-textarea')[data.questionsList.length-1]?.focus();}
  showToast();
}
function deleteQuestion(idx){const data=getPropData(currentPropId);data.questionsList.splice(idx,1);setPropData(currentPropId,data);const el=document.getElementById('q-card-list');if(el)el.innerHTML=renderQuestionCards(data.questionsList);showToast();}
function toggleResolveQ(idx){const data=getPropData(currentPropId);if(!data.questionsList[idx])return;data.questionsList[idx].resolved=!data.questionsList[idx].resolved;setPropData(currentPropId,data);const el=document.getElementById('q-card-list');if(el)el.innerHTML=renderQuestionCards(data.questionsList);showToast();}
function updateQuestion(idx,field,value){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{const data=getPropData(currentPropId);if(!data.questionsList||!data.questionsList[idx])return;data.questionsList[idx][field]=value;setPropData(currentPropId,data);showToast();},500);}

function fieldChange(field,value){
  clearTimeout(saveTimer);saveTimer=setTimeout(()=>{
    const data=getPropData(currentPropId);data[field]=value;
    if(field==='userNotes'){data.userNotesAuthor=currentUser;data.userNotesTs=nowStamp();const bl=document.getElementById('notes-byline');if(bl&&currentUser)bl.textContent='\u2014 '+currentUser+' \u00b7 '+data.userNotesTs;}
    if(field==='directives'){data.directivesAuthor=currentUser;data.directivesTs=nowStamp();const bl=document.getElementById('dir-byline');if(bl&&currentUser)bl.textContent='\u2014 '+currentUser+' \u00b7 '+data.directivesTs;}
    setPropData(currentPropId,data);showToast();
  },600);
}
function setStatus(v){const data=getPropData(currentPropId);data.userStatus=v;setPropData(currentPropId,data);document.querySelectorAll('.status-opt').forEach(b=>b.classList.toggle('selected',b.textContent.trim()===v));showToast();}
function toggleComplete(){const data=getPropData(currentPropId);data.completed=!data.completed;setPropData(currentPropId,data);const prop=PROPS_DATA.find(p=>p.id===currentPropId);if(prop)renderDetail(prop,data);showToast();}

function renderImgGrid(imgs,zone){return imgs.map((s,i)=>'<div class="img-thumb-wrap"><img class="img-thumb" src="'+s+'" loading="lazy"><button class="img-del" onclick="deleteImg(\''+zone+'\','+i+')">\xd7</button></div>').join('');}
function triggerImgUpload(zone){document.getElementById(zone+'-file').click();}
async function handleImgs(input,zone){
  const files=Array.from(input.files);if(!files.length)return;
  const data=getPropData(currentPropId);const key=zone==='ref'?'refImgs':'srcImgs';if(!data[key])data[key]=[];
  for(const f of files)data[key].push(await compressImage(f,900,.78));
  setPropData(currentPropId,data);await saveImages(currentPropId,zone,data[key]);refreshImgGrid(zone,data[key]);input.value='';showToast();
}
async function deleteImg(zone,idx){const data=getPropData(currentPropId);const key=zone==='ref'?'refImgs':'srcImgs';data[key].splice(idx,1);setPropData(currentPropId,data);await saveImages(currentPropId,zone,data[key]);refreshImgGrid(zone,data[key]);showToast();}
function refreshImgGrid(zone,imgs){const g=document.getElementById(zone+'-grid');if(!g)return;g.className=imgs.length?'img-grid':'img-grid empty';g.innerHTML=imgs.length?renderImgGrid(imgs,zone):'<span class="img-placeholder-text">Tap + Add</span>';}
function compressImage(file,maxDim,quality){return new Promise(res=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxDim||h>maxDim){if(w>h){h=h*maxDim/w;w=maxDim;}else{w=w*maxDim/h;h=maxDim;}}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);res(canvas.toDataURL('image/jpeg',quality));};img.src=e.target.result;};reader.readAsDataURL(file);});}

function shareCard(){
  const prop=PROPS_DATA.find(p=>p.id===currentPropId);const data=getPropData(currentPropId);if(!prop)return;
  const es=data.userStatus||prop.status;const qs=(data.questionsList||[]).filter(q=>q.text);
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+prop.name+'</title><style>body{font-family:Georgia,serif;max-width:600px;margin:0 auto;padding:20px;color:#12100E;background:#FAF6EC}h1{font-size:22px;margin-bottom:4px}.chip{display:inline-block;background:#12100E;color:#F5EFE0;font-family:monospace;font-size:9px;padding:3px 10px;border-radius:100px;margin-right:4px;letter-spacing:.06em}.field{background:white;border:1px solid #DDD4B8;border-radius:8px;padding:12px;margin-bottom:10px;font-size:14px;line-height:1.5}.lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#7A7060;margin-bottom:4px}.by{font-size:9px;color:#7A7060;margin-top:6px}.qi{background:#F5EFE0;border-radius:6px;padding:10px;margin-bottom:6px;font-size:13px}.ql{font-size:9px;color:#C9963A;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}.ft{font-size:9px;color:#7A7060;margin-top:24px;border-top:1px solid #DDD4B8;padding-top:10px}</style></head><body>'
    +'<h1>'+prop.name+'</h1><div style="margin-bottom:12px"><span class="chip">'+es+'</span><span class="chip">qty '+prop.qty+'</span><span class="chip">'+prop.hrs+' hrs</span><span class="chip">'+prop.budget+'</span>'+(data.completed?'<span class="chip">\u2713 Complete</span>':'')+'</div>'
    +(prop.notes?'<div class="field"><div class="lbl">Notes</div>'+prop.notes+'</div>':'')
    +(data.userNotes?'<div class="field"><div class="lbl">Additional Notes</div>'+data.userNotes+(data.userNotesAuthor?'<div class="by">\u2014 '+data.userNotesAuthor+(data.userNotesTs?' \u00b7 '+data.userNotesTs:'')+'</div>':'')+'</div>':'')
    +(data.directives?'<div class="field"><div class="lbl">Directives</div>'+data.directives+(data.directivesAuthor?'<div class="by">\u2014 '+data.directivesAuthor+(data.directivesTs?' \u00b7 '+data.directivesTs:'')+'</div>':'')+'</div>':'')
    +((data.spentDollars||data.actualHrs)?'<div class="field"><div class="lbl">Actuals</div>'+(data.spentDollars?'Spent: $'+data.spentDollars+'<br>':'')+(data.actualHrs?'Hours: '+data.actualHrs:'')+'</div>':'')
    +(qs.length?'<div style="margin:16px 0 4px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#7A7060">Questions</div>'+qs.map(q=>'<div class="qi"><div class="ql">'+(q.recipient||'General')+(q.resolved?' \u2014 \u2713 Resolved':'')+'</div>'+q.text+(q.author?'<div class="by">\u2014 '+q.author+(q.ts?' \u00b7 '+q.ts:'')+'</div>':'')+'</div>').join(''):'')
    +'<div class="ft">S&S Props \u00b7 Sense &amp; Sensibility \u00b7 UIUC \u00b7 '+new Date().toLocaleDateString()+'</div></body></html>';
  const blob=new Blob([html],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=prop.name.replace(/[^a-z0-9]/gi,'_')+'_card.html';a.click();URL.revokeObjectURL(a.href);
}

function openAddProp(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');['np-name','np-group','np-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('np-qty').value='1';document.getElementById('np-hrs').value='0';}
async function saveNewProp(){
  const name=document.getElementById('np-name').value.trim();if(!name)return alert('Prop name is required.');
  const slug=name.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,40);const prop_id=slug+'_'+Date.now();
  const np={prop_id,name,section:document.getElementById('np-section').value,grp:document.getElementById('np-group').value||'Individual',qty:parseInt(document.getElementById('np-qty').value)||1,status:document.getElementById('np-status').value,notes:document.getElementById('np-notes').value,budget:document.getElementById('np-budget').value||'TBD',hrs:parseFloat(document.getElementById('np-hrs').value)||0,sort_order:PROPS_DATA.length};
  setSyncStatus('syncing','Saving new prop\u2026');
  try{await sbUpsert('props_master',[np]);PROPS_DATA.push({id:prop_id,section:np.section,group:np.grp,name:np.name,qty:np.qty,status:np.status,notes:np.notes,budget:np.budget,hrs:np.hrs});saveDBLocal({...loadDB(),__props_master:PROPS_DATA});setSyncStatus('ok','Prop added');setTimeout(hideSyncBar,2000);closeModal();renderList();}
  catch(e){setSyncStatus('err','Failed to save prop');}
}

function showView(name){['list-view','detail-view','dash-view','questions-view'].forEach(id=>{document.getElementById(id).style.display=id===name+'-view'?'block':'none';});document.getElementById('search-bar').style.display=name==='list'?'block':'none';document.getElementById('filter-bar').style.display=name==='list'?'flex':'none';}
function showList(){currentView='list';currentPropId=null;showView('list');document.getElementById('header-back').style.display='none';document.getElementById('add-prop-btn').style.display='block';document.getElementById('header-title').textContent='Sense & Sensibility';document.getElementById('header-sub').textContent='Props Design & Management';renderList();updateNav('list');}
function showDash(){currentView='dash';currentPropId=null;showView('dash');document.getElementById('header-back').style.display='none';document.getElementById('add-prop-btn').style.display='none';document.getElementById('header-title').textContent='Dashboard';document.getElementById('header-sub').textContent='S&S Props';renderDash();updateNav('dash');}
function showQuestions(){currentView='questions';currentPropId=null;showView('questions');document.getElementById('header-back').style.display='none';document.getElementById('add-prop-btn').style.display='none';document.getElementById('header-title').textContent='Questions';document.getElementById('header-sub').textContent='Grouped by recipient';renderQuestions();updateNav('questions');}
function updateNav(active){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const m={list:'nav-list',dash:'nav-dash',questions:'nav-questions'};if(m[active])document.getElementById(m[active])?.classList.add('active');}

function renderDash(){
  const db=loadDB();const total=PROPS_DATA.length;
  const needed=PROPS_DATA.filter(p=>{const d=db[p.id]||{};return statusKey(d.userStatus||p.status)==='needed';}).length;
  const complete=PROPS_DATA.filter(p=>{const d=db[p.id]||{};return !!(d.completed);}).length;
  const withNotes=PROPS_DATA.filter(p=>{const d=db[p.id]||{};return !!(d.userNotes||d.directives||(d.questionsList&&d.questionsList.length));}).length;
  const withImgs=PROPS_DATA.filter(p=>{const d=db[p.id]||{};return !!(d.refImgs?.length||d.srcImgs?.length);}).length;
  const withQ=PROPS_DATA.filter(p=>{const d=db[p.id]||{};return !!(d.questionsList&&d.questionsList.some(q=>q.text&&!q.resolved));}).length;
  const openQ=PROPS_DATA.filter(p=>{const d=db[p.id]||{};return !!(d.questionsList&&d.questionsList.some(q=>q.text&&!q.resolved));});
  const attn=PROPS_DATA.filter(p=>{const d=db[p.id]||{};return statusKey(d.userStatus||p.status)==='needed'&&!d.completed&&!(d.userNotes||d.refImgs?.length||d.srcImgs?.length);}).slice(0,8);
  const el=document.getElementById('dash-view');
  el.innerHTML='<div class="dash-title">Production Overview</div>'
    +'<div class="dash-stat-grid">'
    +'<div class="dash-stat highlight"><div class="dash-stat-num">'+total+'</div><div class="dash-stat-label">Total Props</div></div>'
    +'<div class="dash-stat highlight"><div class="dash-stat-num">'+needed+'</div><div class="dash-stat-label">Needed</div></div>'
    +'<div class="dash-stat"><div class="dash-stat-num">'+complete+'</div><div class="dash-stat-label">Complete</div></div>'
    +'<div class="dash-stat"><div class="dash-stat-num">'+withNotes+'</div><div class="dash-stat-label">With Notes</div></div>'
    +'<div class="dash-stat"><div class="dash-stat-num">'+withImgs+'</div><div class="dash-stat-label">With Photos</div></div>'
    +'<div class="dash-stat"><div class="dash-stat-num">'+withQ+'</div><div class="dash-stat-label">Open Qs</div></div></div>'
    +(openQ.length?'<div class="dash-section-title">Open Questions ('+openQ.length+')</div>'+openQ.slice(0,10).map(p=>{const d=db[p.id]||{};return'<div class="dash-item" onclick="openProp(\''+p.id+'\')"><div class="prop-status-dot" style="background:'+statusColor(d.userStatus||p.status)+'"></div><div class="dash-item-name">'+p.name+'</div><div class="dash-item-tag">'+((d.questionsList||[]).filter(q=>q.text&&!q.resolved).length)+'Q</div></div>';}).join(''):'')
    +(attn.length?'<div class="dash-section-title">Needed \u2014 No Notes Yet</div>'+attn.map(p=>'<div class="dash-item" onclick="openProp(\''+p.id+'\')"><div class="prop-status-dot" style="background:#9B2C2C"></div><div class="dash-item-name">'+p.name+'</div><div class="dash-item-tag">'+p.budget+'</div></div>').join(''):'')
    +'<div class="dash-btns"><button class="export-btn" onclick="exportData()">\u2191 Export CSV</button>'
    +'<button class="export-btn" style="flex:0 0 auto;padding:14px 18px" onclick="syncFromCloud().then(()=>{renderDash();renderList();})" title="Re-sync">\u27f3</button>'
    +'<button class="export-btn" style="flex:0 0 auto;padding:14px 18px;color:var(--muted);border-color:var(--muted)" onclick="changeIdentity()" title="Change user">\ud83d\udc64</button></div>';
}

function renderQuestions(){
  const db=loadDB();const grouped={};RECIPIENTS.forEach(r=>grouped[r]=[]);
  PROPS_DATA.forEach(p=>{const d=db[p.id]||{};(d.questionsList||[]).forEach(q=>{if(!q.text||q.resolved)return;const r=q.recipient||'Other';if(!grouped[r])grouped[r]=[];grouped[r].push({prop:p,q});});});
  const hasAny=RECIPIENTS.some(r=>grouped[r].length>0);
  const el=document.getElementById('questions-view');
  if(!hasAny){el.innerHTML='<div class="q-empty"><div class="q-empty-icon">\u2709</div>No open questions.<br>Open any prop and tap <strong>+ Question</strong>.</div>';return;}
  let html='';RECIPIENTS.forEach(r=>{const items=grouped[r];if(!items.length)return;
    html+='<div class="q-recipient-block"><div class="q-recipient-header"><span>'+r+' <span style="opacity:.5">('+items.length+')</span></span><button class="q-email-btn" onclick="emailRecipient(\''+r+'\')">\u2709 Email</button></div>'
      +items.map(({prop,q})=>'<div class="q-item" onclick="openProp(\''+prop.id+'\')"><div class="q-prop-name">'+prop.name+'</div><div class="q-text">'+q.text+'</div>'+(q.author?'<div class="q-item-byline">\u2014 '+q.author+(q.ts?' \u00b7 '+q.ts:'')+'</div>':'')+'</div>').join('')+'</div>';
  });el.innerHTML=html;
}
function emailRecipient(recipient){
  const db=loadDB();const items=[];
  PROPS_DATA.forEach(p=>{const d=db[p.id]||{};(d.questionsList||[]).forEach(q=>{if(!q.text||q.resolved||(q.recipient||'Other')!==recipient)return;items.push({name:p.name,text:q.text,author:q.author,ts:q.ts});});});
  if(!items.length)return;
  const subject=encodeURIComponent('S&S Props \u2014 Questions for '+recipient);
  const lines=items.map(({name,text,author,ts})=>'PROP: '+name+'\n'+text+(author?'\n\u2014 '+author+(ts?' \u00b7 '+ts:''):'')).join('\n\n---\n\n');
  const body=encodeURIComponent('Hi,\n\nProp questions for you on Sense & Sensibility:\n\n---\n\n'+lines+'\n\n---\n\nThanks!\n'+(currentUser||'Noah'));
  window.location.href='mailto:?subject='+subject+'&body='+body;
}

function exportData(){
  const db=loadDB();
  const csv=[['Name','Section','Group','Original Status','Current Status','Complete','Qty','Budget','Shop Hrs','My Notes','Notes Author','Directives','Dir Author','Open Questions','$ Spent','Actual Hrs','Ref Photos','Sourcing Photos'].join(','),
    ...PROPS_DATA.map(p=>{const d=db[p.id]||{};return[p.name,p.section,p.group,p.status,d.userStatus||p.status,d.completed?'Yes':'No',p.qty,p.budget,p.hrs,d.userNotes||'',d.userNotesAuthor||'',d.directives||'',d.directivesAuthor||'',(d.questionsList||[]).filter(q=>q.text&&!q.resolved).map(q=>'['+( q.recipient||'Other')+'] '+q.text).join(' | '),d.spentDollars||'',d.actualHrs||'',(d.refImgs||[]).length,(d.srcImgs||[]).length].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',');})].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SenseAndSensibility_Props_Export.csv';a.click();
}

function showToast(){const t=document.getElementById('save-toast');t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),1800);}

// INIT
initPropsFromCache();
renderList();
checkIdentity();
document.getElementById('list-view').style.display='block';
document.getElementById('add-prop-btn').style.display='block';
syncFromCloud().then(ok=>{if(ok){renderList();if(currentView==='dash')renderDash();}});
</script>
